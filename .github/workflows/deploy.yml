name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: deploy

permissions:
  contents: read
  id-token: write  # Workload Identity Federation（キーレス認証）に必要

env:
  REGION: asia-northeast1
  SERVICE: cloudmedic

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: pytest
        env:
          CLOUDMEDIC_SCRIPTED: "1"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --source . \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "$REGION" \
            --allow-unauthenticated \
            --service-account "cloudmedic-runtime@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            --min-instances 1 --max-instances 2 --memory 512Mi \
            --set-env-vars "GOOGLE_GENAI_USE_VERTEXAI=true,GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }},GOOGLE_CLOUD_LOCATION=global"

      - name: Smoke test
        run: |
          URL=$(gcloud run services describe "$SERVICE" \
            --project "${{ secrets.GCP_PROJECT_ID }}" --region "$REGION" \
            --format 'value(status.url)')
          echo "Deployed: $URL"
          curl -fsS "$URL/healthz"
          curl -fsS "$URL/api/state" > /dev/null
          echo "Smoke test passed ✅"
